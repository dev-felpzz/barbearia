<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar — Elite Barber</title>
    <meta name="description" content="Acesse sua conta na Elite Barber." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        /* ===== TOKENS (espelha o style.css existente) ===== */
        :root {
            --black: #0d0d0d;
            --dark: #1e1e1e;
            --dark-2: #161616;
            --dark-3: #252525;
            --white: #ffffff;
            --gold: #c9a227;
            --gold-light: #e0bc4a;
            --text-muted: #a8a8a8;
            --radius: 16px;
            --ff-display: "Fraunces", serif;
            --ff-body: "Inter", sans-serif;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-padding-top: 80px;
        }

        body {
            font-family: var(--ff-body);
            background: var(--black);
            color: var(--white);
            line-height: 1.6;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ::selection {
            background: var(--gold);
            color: var(--black);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--black);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 4px;
        }

        /* ===== LADO VISUAL (esquerda) ===== */
        .visual {
            position: relative;
            overflow: hidden;
            background: var(--dark-2);
        }

        .visual-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.45;
            transform: scale(1.04);
            transition: transform 12s ease;
        }

        .visual:hover .visual-img {
            transform: scale(1.0);
        }

        .visual-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                    rgba(13, 13, 13, 0.6) 0%,
                    rgba(201, 162, 39, 0.12) 60%,
                    rgba(13, 13, 13, 0.85) 100%);
        }

        .visual-content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
        }

        .logo {
            font-family: var(--ff-display);
            font-weight: 600;
            font-size: 1.55rem;
            letter-spacing: 0.01em;
            color: var(--white);
        }

        .logo span {
            color: var(--gold);
            font-style: italic;
        }

        .visual-quote {
            max-width: 340px;
        }

        .visual-quote blockquote {
            font-family: var(--ff-display);
            font-style: italic;
            font-size: clamp(1.5rem, 2.5vw, 2.1rem);
            font-weight: 500;
            line-height: 1.25;
            color: var(--white);
            margin-bottom: 1rem;
        }

        .visual-quote blockquote em {
            font-style: normal;
            color: var(--gold);
        }

        .visual-quote cite {
            font-size: 0.8rem;
            letter-spacing: 0.18em;
            color: var(--text-muted);
            font-style: normal;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* decoração dourada no canto */
        .visual::before {
            content: "";
            position: absolute;
            top: -120px;
            right: -120px;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201, 162, 39, 0.22) 0%, transparent 70%);
            z-index: 0;
        }

        /* ===== LADO DO FORMULÁRIO (direita) ===== */
        .form-side {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem 2rem;
            background: var(--black);
        }

        .form-box {
            width: 100%;
            max-width: 420px;
        }

        .form-header {
            margin-bottom: 2.2rem;
            text-align: center;
        }

        .form-tag {
            display: block;
            font-size: 0.72rem;
            letter-spacing: 0.28em;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 0.7rem;
        }

        .form-title {
            font-family: var(--ff-display);
            font-weight: 600;
            font-size: clamp(1.8rem, 3vw, 2.4rem);
            letter-spacing: 0.005em;
        }

        .form-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .form-subtitle a {
            color: var(--gold);
            font-weight: 600;
            transition: color 0.2s;
        }

        .form-subtitle a:hover {
            color: var(--gold-light);
        }

        /* ===== CAMPOS ===== */
        .field {
            margin-bottom: 1.1rem;
        }

        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.45rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 17px;
            height: 17px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.25s;
        }

        .input-wrap input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: var(--dark-3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: var(--white);
            font-family: var(--ff-body);
            font-size: 0.92rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        .input-wrap input::placeholder {
            color: rgba(168, 168, 168, 0.5);
        }

        .input-wrap input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.12);
        }

        .input-wrap input:focus+svg,
        .input-wrap:focus-within svg {
            color: var(--gold);
        }

        /* ícone fica depois do input no DOM mas posicionado igual */
        .input-wrap {
            display: flex;
            align-items: center;
        }

        .input-wrap input {
            order: 1;
        }

        .input-wrap .ico {
            order: 0;
            position: absolute;
            left: 1rem;
        }

        /* toggle senha */
        .eye-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: 0;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
            order: 2;
        }

        .eye-btn:hover {
            color: var(--gold);
        }

        .eye-btn svg {
            width: 17px;
            height: 17px;
        }

        /* esqueceu a senha */
        .forgot {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.4rem;
        }

        .forgot a {
            font-size: 0.78rem;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .forgot a:hover {
            color: var(--gold);
        }

        /* ===== MENSAGEM DE ERRO ===== */
        .msg {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1rem;
            display: none;
        }

        .msg.error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .msg.success {
            background: rgba(201, 162, 39, 0.12);
            border: 1px solid rgba(201, 162, 39, 0.3);
            color: var(--gold-light);
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        /* ===== BOTÃO PRINCIPAL ===== */
        .btn-submit {
            width: 100%;
            padding: 1rem;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            color: var(--black);
            font-family: var(--ff-body);
            font-weight: 700;
            font-size: 0.97rem;
            letter-spacing: 0.03em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -8px rgba(201, 162, 39, 0.6);
        }

        .btn-submit:active {
            transform: scale(0.97);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* spinner */
        .spinner {
            width: 17px;
            height: 17px;
            border: 2px solid rgba(0, 0, 0, 0.25);
            border-top-color: var(--black);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== DIVISOR ===== */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            margin: 1.6rem 0;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .divider span {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            letter-spacing: 0.05em;
        }

        /* ===== BOTÕES SOCIAIS ===== */
        .social-btns {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn-social {
            width: 100%;
            padding: 0.82rem 1.2rem;
            background: var(--dark-3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            color: var(--white);
            font-family: var(--ff-body);
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: background 0.25s, border-color 0.25s, transform 0.25s var(--ease);
        }

        .btn-social:hover {
            background: var(--dark);
            border-color: rgba(255, 255, 255, 0.18);
            transform: translateY(-2px);
        }

        .btn-social:active {
            transform: scale(0.97);
        }

        .btn-social svg {
            flex-shrink: 0;
        }

        /* cores específicas nos ícones */
        .btn-google svg .g-red {
            fill: #EA4335;
        }

        .btn-google svg .g-blue {
            fill: #4285F4;
        }

        .btn-google svg .g-yellow {
            fill: #FBBC05;
        }

        .btn-google svg .g-green {
            fill: #34A853;
        }

        .btn-facebook svg {
            color: #1877F2;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
            }

            .visual {
                display: none;
            }

            .form-side {
                padding: 2.5rem 1.5rem;
                justify-content: flex-start;
                padding-top: 3rem;
            }
        }

        @media (max-width: 400px) {
            .form-box {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- LADO VISUAL -->
    <aside class="visual">
        <!-- substitua pelo caminho da sua imagem real -->
        <img src="../static/img/paralaxx.jpg" alt="" class="visual-img" />
        <div class="visual-overlay"></div>
        <div class="visual-content">
            <a href="/" class="logo">ELITE<span>BARBER</span></a>
            <div class="visual-quote">
                <blockquote>Seu estilo começa aqui. <em>Bem-vindo de volta.</em></blockquote>
                <cite>Elite Barber — Barbearia Premium</cite>
            </div>
        </div>
    </aside>

    <!-- FORMULÁRIO -->
    <main class="form-side">
        <div class="form-box">

            <div class="form-header">
                <span class="form-tag">ACESSE SUA CONTA</span>
                <h1 class="form-title">Entrar</h1>
                <p class="form-subtitle">
                    Novo por aqui? <a href="/cadastro">Crie sua conta</a>
                </p>
            </div>

            <!-- Mensagem de feedback -->
            <div class="msg" id="mensagem" role="alert" aria-live="polite"></div>

            <form id="loginForm" novalidate>

                <!-- E-mail -->
                <div class="field">
                    <label for="email">E-mail</label>
                    <div class="input-wrap">
                        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <rect x="3" y="5" width="18" height="14" rx="2" />
                            <path d="m3 7 9 6 9-6" />
                        </svg>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email"
                            required />
                    </div>
                </div>

                <!-- Senha -->
                <div class="field">
                    <label for="senha">Senha</label>
                    <div class="input-wrap">
                        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <rect x="3" y="11" width="18" height="11" rx="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input type="password" id="senha" name="senha" placeholder="••••••••"
                            autocomplete="current-password" required />
                        <button type="button" class="eye-btn" id="toggleSenha" aria-label="Mostrar/ocultar senha">
                            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                    <div class="forgot">
                        <a href="#">Esqueceu a senha?</a>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-submit" id="btnSubmit">
                    <span class="spinner" id="spinner"></span>
                    <span id="btnText">Entrar</span>
                </button>

            </form>

            <!-- Divisor -->
            <div class="divider"><span>ou continue com</span></div>

            <!-- Botões sociais -->
            <div class="social-btns">

                <!-- Google -->
                <button class="btn-social btn-google" type="button" id="btnGoogle">
                    <svg width="20" height="20" viewBox="0 0 48 48">
                        <path class="g-blue"
                            d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z" />
                        <path class="g-green"
                            d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.32-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z" />
                        <path class="g-yellow"
                            d="M11.68 28.18A13.9 13.9 0 0 1 10.9 24c0-1.45.25-2.86.78-4.18v-5.7H4.34A23.93 23.93 0 0 0 0 24c0 3.88.93 7.55 2.57 10.79l7.11-5.52z" />
                        <path class="g-red"
                            d="M24 9.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 3.18 29.93 1 24 1 15.4 1 7.96 5.93 4.34 13.12l7.34 5.7C13.42 13.62 18.27 9.75 24 9.75z" />
                    </svg>
                    Continuar com Google
                </button>

                <!-- Facebook -->
                <button class="btn-social btn-facebook" type="button" id="btnFacebook">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                        <path
                            d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073c0 6.031 4.388 11.032 10.125 11.927v-8.437H7.078v-3.49h3.047V9.41c0-3.02 1.791-4.688 4.533-4.688 1.313 0 2.686.235 2.686.235v2.953h-1.513c-1.491 0-1.956.928-1.956 1.879v2.261h3.328l-.532 3.49h-2.796v8.437C19.612 23.105 24 18.104 24 12.073z" />
                    </svg>
                    Continuar com Facebook
                </button>

            </div>

        </div><!-- /form-box -->
    </main>

    <script>
        /* ===== TOGGLE SENHA ===== */
        const toggleSenha = document.getElementById("toggleSenha");
        const senhaInput = document.getElementById("senha");
        const eyeIcon = document.getElementById("eyeIcon");

        toggleSenha.addEventListener("click", () => {
            const visivel = senhaInput.type === "text";
            senhaInput.type = visivel ? "password" : "text";
            eyeIcon.innerHTML = visivel
                ? `<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>`
                : `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94
            M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19
            m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`;
        });

        /* ===== FORMULÁRIO DE LOGIN ===== */
        const form = document.getElementById("loginForm");
        const msgBox = document.getElementById("mensagem");
        const btnSubmit = document.getElementById("btnSubmit");
        const spinner = document.getElementById("spinner");
        const btnText = document.getElementById("btnText");

        function showMsg(texto, tipo = "error") {
            msgBox.textContent = texto;
            msgBox.className = `msg ${tipo}`;
        }
        function hideMsg() { msgBox.className = "msg"; }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            hideMsg();

            const email = document.getElementById("email").value.trim();
            const senha = document.getElementById("senha").value;

            /* validação básica no front */
            if (!email || !senha) {
                showMsg("Preencha e-mail e senha.");
                return;
            }

            /* estado de carregamento */
            btnSubmit.disabled = true;
            spinner.style.display = "block";
            btnText.textContent = "Entrando…";

            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, senha }),
                });

                const data = await res.json();

                if (res.ok) {
                    showMsg(`Bem-vindo de volta, ${data.nome}! Redirecionando…`, "success");
                    setTimeout(() => { window.location.href = "/"; }, 1200);
                } else {
                    showMsg(data.erro || "Não foi possível entrar. Tente novamente.");
                }
            } catch {
                showMsg("Erro de conexão. Verifique sua internet e tente novamente.");
            } finally {
                btnSubmit.disabled = false;
                spinner.style.display = "none";
                btnText.textContent = "Entrar";
            }
        });

        /* ===== BOTÕES SOCIAIS (placeholders — integre OAuth conforme sua stack) ===== */
        document.getElementById("btnGoogle").addEventListener("click", () => {
            // Integre com Google OAuth 2.0 / Flask-Dance / Authlib
            window.location.href = "/auth/google";
        });
        document.getElementById("btnFacebook").addEventListener("click", () => {
            window.location.href = "/auth/facebook";
        });
    </script>

</body>

</html>
