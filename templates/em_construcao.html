<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }} — Elite Barber</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
    <style>
        .em-construcao {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 9rem 1.5rem 4rem;
        }
        .em-construcao .eyebrow {
            color: var(--gold);
            font-size: 0.75rem;
            letter-spacing: 0.28em;
            font-weight: 600;
            margin-bottom: 0.9rem;
        }
        .em-construcao h1 {
            font-family: var(--ff-display);
            font-weight: 600;
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            margin-bottom: 0.8rem;
        }
        .em-construcao p {
            color: var(--text-muted);
            max-width: 420px;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>

    {% include "partials/header.html" %}

    <main class="em-construcao">
        <span class="eyebrow">EM CONSTRUÇÃO</span>
        <h1>{{ titulo }}</h1>
        <p>Essa página faz parte das próximas etapas do projeto e ainda está sendo construída.</p>
        <a href="{{ url_for('home') }}" class="btn btn-gold btn-sm">Voltar à Home</a>
    </main>

    <script src="{{ url_for('static', filename='js/header.js') }}"></script>
</body>

</html>
